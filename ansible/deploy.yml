---
- name: Full Automated Deploy K3s and ArgoCD (Final DZ7)
  hosts: k8s_node
  become: yes
  tasks:
    - name: Ensure K3s config directory exists
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Configure K3s mirrors (Fix slow downloads/IPv6 issues)
      copy:
        dest: /etc/rancher/k3s/registries.yaml
        content: |
          mirrors:
            docker.io:
              endpoint:
                - "https://mirror.gcr.io"
                - "https://registry-1.docker.io"

    - name: Install K3s (Using IPv4 only)
      shell: curl -4 -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s node to be ready
      command: /usr/local/bin/k3s kubectl get nodes
      register: nodes
      until: '" Ready " in nodes.stdout'
      retries: 20
      delay: 5

    - name: Create ArgoCD namespace
      shell: /usr/local/bin/k3s kubectl create namespace argocd --dry-run=client -o yaml | /usr/local/bin/k3s kubectl apply -f -

    - name: Install ArgoCD (Fast Manifests)
      shell: /usr/local/bin/k3s kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml --server-side --force-conflicts

    - name: Patch ArgoCD Service to NodePort
      shell: |
        /usr/local/bin/k3s kubectl patch svc argocd-server -n argocd -p '{"spec": {"type": "NodePort"}}'

    - name: Wait for ArgoCD CRDs to settle
      pause:
        seconds: 20
    
    - name: Copy and Apply Redis manifest (Required for Backend)
      copy:
        src: ../k3s/redis.yaml
        dest: /tmp/redis.yaml
    
    - name: Apply Redis to cluster
      shell: /usr/local/bin/k3s kubectl apply -f /tmp/redis.yaml

    - name: Apply ArgoCD Apps from local file (Ensures latest fixes)
      copy:
        src: ../k3s/argocd-apps.yaml
        dest: /tmp/argocd-apps.yaml

    - name: Sync ArgoCD Applications
      shell: /usr/local/bin/k3s kubectl apply -f /tmp/argocd-apps.yaml

    - name: Wait for Flask Backend to be Running
      shell: /usr/local/bin/k3s kubectl get pods -n default
      register: app_pods
      until: '"flask-backend" in app_pods.stdout and "Running" in app_pods.stdout'
      retries: 30
      delay: 10

    - name: Get ArgoCD Admin Password (Safe decode)
      shell: /usr/local/bin/k3s kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
      register: argo_password_raw

    - name: Show Final Access Info
      debug:
        msg: 
          - "--- DEPLOYMENT SUCCESSFUL ---"
          - "ArgoCD URL: https://{{ ansible_host }}:(see NodePort in kubectl get svc)"
          - "ArgoCD Login: admin"
          - "ArgoCD Password: {{ argo_password_raw.stdout | b64decode }}"
          - "App URL: http://{{ ansible_host }}:30080"