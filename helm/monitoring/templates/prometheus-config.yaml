apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      - job_name: 'flask-app'
        static_configs:
          - targets: ['flask-backend:80']
      - job_name: 'node'
        static_configs:
          - targets: ['node-exporter:9100']
      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']